<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student | Cloud Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body"> <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card p-5 shadow">
            
            <div class="text-center mb-4">
                <div class="login-icon">👤</div>
                <h4 class="fw-bold mt-2">Add Student</h4>
                <p class="text-muted small">Create a new student account</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Student Username</label>
                    <input type="text" name="username" class="form-control-pastel w-100" placeholder="e.g. nived_bca" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Default Password</label>
                    <input type="password" name="password" class="form-control-pastel w-100" placeholder="••••••••" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn-pastel shadow-sm">Register Student</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-link text-decoration-none text-muted small">Back to Dashboard</a>
                </div>
            </form>

        </div>
    </div>

</body>
</html>
