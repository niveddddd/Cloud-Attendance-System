<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="d-flex">
        <div class="bg-dark text-white p-3" style="width:250px; min-height:100vh;">
            <h4>Admin Panel</h4><hr>
            <ul class="nav flex-column">
                <li class="nav-item"><a href="/admin-dashboard" class="nav-link text-white">Dashboard</a></li>
                <li class="nav-item"><a href="/register" class="nav-link text-white">Register Student</a></li>
                <li class="nav-item"><a href="/export" class="nav-link text-success">Export Excel</a></li>
                <li class="nav-item"><a href="/logout" class="nav-link text-danger">Logout</a></li>
            </ul>
        </div>
        <div class="container-fluid p-4">
            <h2>Attendance Records</h2>
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5>Manual Entry</h5>
                    <form action="/admin-mark" method="POST" class="row g-3">
                        <div class="col-auto"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
                        <div class="col-auto"><input type="date" name="date" class="form-control" required></div>
                        <div class="col-auto"><button type="submit" class="btn btn-warning">Add Record</button></div>
                    </form>
                </div>
            </div>
            <table class="table table-bordered bg-white">
                <thead class="table-dark">
                    <tr><th>Student Name</th><th>Date</th><th>Action</th></tr>
                </thead>
                <tbody>
                    {% for row in attendance %}
                    <tr>
                        <td>{{ row[0] }}</td><td>{{ row[1] }}</td>
                        <td><a href="/delete-student/{{ row[0] }}" class="btn btn-danger btn-sm">Delete</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
