<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="sidebar p-3">
        <h4>Admin Panel</h4><hr>
        <nav class="nav flex-column">
            <a href="/admin-dashboard" class="nav-link active">Dashboard</a>
            <a href="/register" class="nav-link">Register Student</a>
            <a href="/generate-qr/Main_Class" class="nav-link">Generate QR</a>
            <a href="/export" class="nav-link text-success">Export Excel</a>
            <a href="/logout" class="nav-link text-danger">Logout</a>
        </nav>
    </div>
    <div class="main-content">
        <h2>Attendance Management</h2>
        <div class="card p-3 mb-4">
            <h5>Manual Record</h5>
            <form action="/admin-mark" method="POST" class="row g-2">
                <div class="col-auto"><input type="text" name="username" class="form-control" placeholder="Student Name"></div>
                <div class="col-auto"><input type="date" name="date" class="form-control"></div>
                <div class="col-auto"><button type="submit" class="btn btn-dark">Add</button></div>
            </form>
        </div>
        <table class="table table-hover card">
            <thead class="table-dark">
                <tr><th>Name</th><th>Date</th><th>Action</th></tr>
            </thead>
            <tbody>
                {% for row in attendance %}
                <tr>
                    <td>{{ row[0] }}</td><td>{{ row[1] }}</td>
                    <td><a href="/delete-student/{{ row[0] }}" class="btn btn-danger btn-sm">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
