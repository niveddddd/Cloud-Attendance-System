<!DOCTYPE html>
<html>
<head>
    <title>Scan QR - Cloud Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-center">
    <div class="container mt-5">
        <div class="card shadow p-4 d-inline-block">
            <h2>Scan for {{ class_name }}</h2>
            <p class="text-muted">Scan this code to mark your attendance</p>
            <hr>
            <img src="{{ url_for('static', filename='qr_code.png') }}" class="img-fluid mb-3" style="max-width: 300px;">
            <br>
            <a href="/admin-dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
